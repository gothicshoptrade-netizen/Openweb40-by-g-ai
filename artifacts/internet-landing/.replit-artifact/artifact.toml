kind = "web"
previewPath = "/"
title = "Интернет для загородной жизни"
version = "1.0.0"
id = "artifacts/internet-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20761

[services.development]
run = "pnpm --filter @workspace/internet-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/internet-landing", "run", "build" ]
publicDir = "artifacts/internet-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20761"
BASE_PATH = "/"
